name: CI/CD - Heart Failure Prediction System

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Job 1: Code Quality ────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint tools
        run: pip install flake8

      - name: Check for syntax errors
        run: |
          flake8 . --count --select=E9,F63,F7 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # ── Job 2: Verify all scripts parse cleanly ────────────────────────────────
  verify-scripts:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn pandas numpy scikit-learn pydantic \
                      mlflow psycopg2-binary evidently joblib
          pip install xgboost==3.2.0

      - name: Verify ETL pipeline
        run: python -c "import ast; ast.parse(open('hf_etl_pipeline.py').read()); print('ETL pipeline OK')"

      - name: Verify training script
        run: python -c "import ast; ast.parse(open('hf_train_model.py').read()); print('Training script OK')"

      - name: Verify API
        run: python -c "import ast; ast.parse(open('hf_app.py').read()); print('API script OK')"

      - name: Verify drift monitor
        run: python -c "import ast; ast.parse(open('hf_monitor_drift.py').read()); print('Drift monitor OK')"

      - name: Verify all imports load
        run: |
          python -c "
          import fastapi, uvicorn, pandas, numpy, sklearn, mlflow, evidently, xgboost
          print('All core imports successful')
          "

  # ── Job 3: Build Docker image ──────────────────────────────────────────────
  build-docker:
    runs-on: ubuntu-latest
    needs: verify-scripts
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare MLflow artifacts for Docker build
        run: |
          mkdir -p mlruns/1/models/ci-stub/artifacts
          cat > mlruns/1/models/ci-stub/artifacts/MLmodel << 'EOF'
          artifact_path: /app/mlruns/1/models/ci-stub/artifacts
          flavors:
            sklearn:
              pickled_model: model.skops
              serialization_format: skops
              sklearn_version: 1.9.0
          mlflow_version: 3.14.0
          run_id: ci-stub
          EOF
          touch mlruns/1/models/ci-stub/artifacts/model.skops

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: hf_Dockerfile
          push: false
          tags: heart-failure-api:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Confirm build success
        run: echo "Docker image built successfully"

  # ── Job 4: Clinical logic validation ──────────────────────────────────────
  validate-clinical-logic:
    runs-on: ubuntu-latest
    needs: verify-scripts
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy

      - name: Validate feature engineering logic
        run: |
          python -c "
          import pandas as pd
          import numpy as np

          test_patient = {
              'serum_creatinine': 2.0,
              'ejection_fraction': 25,
              'age': 70,
              'serum_sodium': 130,
              'time': 20,
              'anaemia': 1,
              'high_blood_pressure': 1
          }
          df = pd.DataFrame([test_patient])

          kidney_heart = int((df['serum_creatinine'].iloc[0] > 1.5) and (df['ejection_fraction'].iloc[0] < 30))
          assert kidney_heart == 1, 'kidney_heart_risk calculation failed'

          hyponatremia = int(df['serum_sodium'].iloc[0] < 135)
          assert hyponatremia == 1, 'hyponatremia calculation failed'

          comorbidity = int(df['anaemia'].iloc[0] + df['high_blood_pressure'].iloc[0])
          assert comorbidity == 2, 'comorbidity_score calculation failed'

          print('All clinical logic validations passed')
          print(f'  kidney_heart_risk: {kidney_heart}')
          print(f'  hyponatremia:      {hyponatremia}')
          print(f'  comorbidity_score: {comorbidity}')
          "

      - name: Validate risk thresholds
        run: |
          python -c "
          # Validate that our decision threshold logic is correct
          DECISION_THRESHOLD = 0.3

          test_cases = [
              (0.10, 'Low',    0),  # probability < 0.3 → Low Risk, no death predicted
              (0.45, 'Medium', 1),  # 0.3 <= prob < 0.6 → Medium Risk, death predicted
              (0.75, 'High',   1),  # prob >= 0.6 → High Risk, death predicted
          ]

          for prob, expected_risk, expected_pred in test_cases:
              pred = int(prob >= DECISION_THRESHOLD)
              if prob < 0.30:
                  risk = 'Low'
              elif prob < 0.60:
                  risk = 'Medium'
              else:
                  risk = 'High'

              assert risk == expected_risk, f'Risk level wrong for prob={prob}: got {risk}, expected {expected_risk}'
              assert pred == expected_pred, f'Prediction wrong for prob={prob}: got {pred}, expected {expected_pred}'

          print('All risk threshold validations passed')
          print(f'  threshold: {DECISION_THRESHOLD}')
          print(f'  Low risk:    prob < 0.30')
          print(f'  Medium risk: 0.30 <= prob < 0.60')
          print(f'  High risk:   prob >= 0.60')
          "

  # ── Job 5: Notify ──────────────────────────────────────────────────────────
  notify:
    runs-on: ubuntu-latest
    needs: [build-docker, validate-clinical-logic]
    if: always()
    steps:
      - name: Pipeline status
        run: |
          if [ "${{ needs.build-docker.result }}" == "success" ] && \
             [ "${{ needs.validate-clinical-logic.result }}" == "success" ]; then
            echo "✅ CI/CD pipeline passed"
            echo "   - Code is lint-clean"
            echo "   - All scripts parse correctly"
            echo "   - Docker image builds successfully"
            echo "   - Clinical logic validated"
            echo "   - Risk threshold logic validated"
          else
            echo "❌ CI/CD pipeline failed — check logs above"
            exit 1
          fi
